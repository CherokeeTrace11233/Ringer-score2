<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ringer Score" />
  <title>Ringer Score</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8; --bg2: #ede7d9; --card: #fff; --ink: #1a1208; --ink2: #5a4e3a;
      --gold: #b8860b; --gold-light: #d4a843; --red: #c0392b; --blue: #1a5276;
      --green: #1e7e34; --border: #c8b89a; --shadow: rgba(0,0,0,0.10);
    }
    body { background: var(--bg); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; padding-bottom: 50px; }
    header { background: var(--ink); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold-light); letter-spacing: 3px; line-height: 1; }
    .brand p { font-size: 11px; color: #8a7a60; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
    nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    nav button { background: transparent; border: 1px solid #4a3f2f; color: #c8b89a; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Crimson Pro', Georgia, serif; transition: all 0.15s; white-space: nowrap; }
    nav button.active, nav button:hover { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 600; }
    main { max-width: 900px; margin: 24px auto; padding: 0 14px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow); }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--ink); letter-spacing: 2px; border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin-bottom: 16px; }
    .empty { color: var(--ink2); font-style: italic; font-size: 15px; }
    .scorecard-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.scorecard { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 560px; }
    table.scorecard th { background: var(--ink); color: var(--gold-light); font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; padding: 6px 4px; text-align: center; border: 1px solid #333; }
    table.scorecard th.label-col { text-align: left; padding-left: 8px; min-width: 60px; }
    table.scorecard td { text-align: center; padding: 6px 4px; border: 1px solid var(--border); font-size: 15px; font-weight: 600; min-width: 34px; }
    table.scorecard td.label-col { text-align: left; padding-left: 8px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 13px; color: var(--ink2); background: var(--bg2); }
    table.scorecard td.total-col { background: var(--bg2); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
    table.scorecard tr.par-row td { background: #f9f5ee; color: var(--ink2); font-size: 13px; font-weight: 400; }
    table.scorecard tr.ringer-row td { background: #f0f7f0; }
    .score-cell { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
    .score-eagle { border: 2px solid var(--blue); border-radius: 50%; outline: 2px solid var(--blue); outline-offset: 2px; color: var(--blue); font-weight: 700; }
    .score-birdie { border: 2px solid var(--blue); border-radius: 50%; color: var(--blue); font-weight: 700; }
    .score-par { color: var(--ink); }
    .score-bogey { border: 2px solid var(--red); color: var(--red); font-weight: 600; }
    .score-double { outline: 2px solid var(--red); outline-offset: 2px; border: 2px solid var(--red); color: var(--red); font-weight: 600; }
    .score-worse { outline: 2px solid #8B0000; outline-offset: 2px; border: 2px solid #8B0000; color: #8B0000; font-weight: 600; }
    .score-empty { color: #ccc; font-size: 12px; }
    .round-item { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
    .round-item-header { background: var(--bg2); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .round-item-date { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--ink); }
    .round-item-score { font-size: 14px; color: var(--ink2); }
    .round-item-actions { display: flex; gap: 8px; align-items: center; }
    .delete-btn { background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 18px; padding: 0 4px; }
    .round-item-body { padding: 12px; display: none; }
    .round-item-body.open { display: block; }
    .form-section { margin-bottom: 20px; }
    .form-section-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--gold); margin-bottom: 10px; }
    label.field-label { display: block; font-size: 11px; color: var(--ink2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
    input[type="date"] { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 9px 11px; color: var(--ink); font-size: 15px; font-family: 'Crimson Pro', Georgia, serif; width: 100%; max-width: 260px; -webkit-appearance: none; }
    input[type="date"]:focus { outline: none; border-color: var(--gold); }
    .hole-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; margin-bottom: 10px; }
    .hole-input-cell { text-align: center; }
    .hole-input-cell .hole-num { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--ink2); letter-spacing: 1px; margin-bottom: 2px; }
    .hole-input-cell .hole-par { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .hole-input-cell input { width: 100%; text-align: center; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 7px 2px; font-size: 16px; font-family: 'Crimson Pro', Georgia, serif; font-weight: 600; color: var(--ink); -webkit-appearance: none; }
    .hole-input-cell input:focus { outline: none; border-color: var(--gold); background: #fffdf7; }
    .submit-btn { margin-top: 16px; width: 100%; background: var(--ink); color: var(--gold-light); border: none; border-radius: 6px; padding: 14px 0; font-size: 18px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; cursor: pointer; }
    .ringer-total-box { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .ringer-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 18px; text-align: center; }
    .ringer-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink2); margin-bottom: 4px; }
    .ringer-stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--ink); }
    .ringer-stat-value.under { color: var(--blue); }
    .ringer-stat-value.over { color: var(--red); }
    .rounds-played { font-size: 14px; color: var(--ink2); margin-bottom: 14px; font-style: italic; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand"><h1>Ringer Score</h1><p>Season Best Tracker</p></div>
    <nav>
      <button class="active" onclick="showView('ringer')" id="btn-ringer">⭐ Ringer Card</button>
      <button onclick="showView('add')" id="btn-add">+ Add Round</button>
      <button onclick="showView('history')" id="btn-history">History</button>
    </nav>
  </div>
</header>
<main>
  <div id="view-ringer">
    <div class="card">
      <div class="card-title">⭐ My Ringer Scorecard</div>
      <div class="rounds-played" id="rounds-played">Loading...</div>
      <div class="ringer-total-box" id="ringer-totals"></div>
      <div class="scorecard-wrap"><table class="scorecard" id="ringer-table"></table></div>
    </div>
  </div>
  <div id="view-add" style="display:none;">
    <div class="card">
      <div class="card-title">Add a New Round</div>
      <div class="form-section">
        <label class="field-label">Date</label>
        <input type="date" id="round-date" />
      </div>
      <div class="form-section">
        <div class="form-section-title">Front Nine</div>
        <div class="hole-grid" id="front-nine-inputs"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">Back Nine</div>
        <div class="hole-grid" id="back-nine-inputs"></div>
      </div>
      <button class="submit-btn" onclick="saveRound()">Save Round</button>
    </div>
  </div>
  <div id="view-history" style="display:none;">
    <div class="card">
      <div class="card-title">Round History</div>
      <div id="round-history"><p class="empty">Loading...</p></div>
    </div>
  </div>
</main>
<script>
  const PARS = [5,4,3,5,4,3,4,4,4,5,3,4,4,4,4,4,3,5];
  const FRONT_PAR = PARS.slice(0,9).reduce((a,b)=>a+b,0);
  const BACK_PAR  = PARS.slice(9).reduce((a,b)=>a+b,0);
  const TOTAL_PAR = FRONT_PAR + BACK_PAR;
  const SUPABASE_URL = 'https://wkpgbfkovacovfjsnvmr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrcGdiZmtvdmFjb3ZmanNudm1yIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODEwNTMxNSwiZXhwIjoyMDkzNjgxMzE1fQ.DLI9s6vOLEKEivsMj8urxjbxHAJsidp7HeOYaiwpKPE';
  const HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  let rounds = [];
  document.getElementById('round-date').value = new Date().toISOString().split('T')[0];

  function buildInputs(){['front','back'].forEach((nine,ni)=>{const container=document.getElementById(`${nine}-nine-inputs`);container.innerHTML='';for(let i=0;i<9;i++){const holeNum=ni*9+i+1;const par=PARS[holeNum-1];const cell=document.createElement('div');cell.className='hole-input-cell';cell.innerHTML=`<div class="hole-num">${holeNum}</div><div class="hole-par">Par ${par}</div><input type="number" id="hole-${holeNum}" min="1" max="12" placeholder="${par}" inputmode="numeric" />`;container.appendChild(cell);}});}

  function scoreCell(score,par){if(!score&&score!==0)return`<span class="score-cell score-empty">—</span>`;const diff=score-par;let cls='score-par';if(diff<=-2)cls='score-eagle';else if(diff===-1)cls='score-birdie';else if(diff===1)cls='score-bogey';else if(diff===2)cls='score-double';else if(diff>=3)cls='score-worse';return`<span class="score-cell ${cls}">${score}</span>`;}

  function buildScorecardTable(scores,tableEl){const front=scores.slice(0,9);const back=scores.slice(9,18);const frontTotal=front.reduce((a,b)=>a+(b||0),0);const backTotal=back.reduce((a,b)=>a+(b||0),0);const grandTotal=frontTotal+backTotal;const hasFront=front.some(s=>s!==null);const hasBack=back.some(s=>s!==null);const holeHeaders=(start)=>Array.from({length:9},(_,i)=>`<th>${start+i+1}</th>`).join('');const parCells=(start)=>PARS.slice(start,start+9).map(p=>`<td>${p}</td>`).join('');const scoreCells=(arr,start)=>arr.map((s,i)=>`<td>${scoreCell(s,PARS[start+i])}</td>`).join('');tableEl.innerHTML=`<thead><tr><th class="label-col">Hole</th>${holeHeaders(0)}<th>Out</th>${holeHeaders(9)}<th>In</th><th>Tot</th></tr></thead><tbody><tr class="par-row"><td class="label-col">Par</td>${parCells(0)}<td class="total-col">${FRONT_PAR}</td>${parCells(9)}<td class="total-col">${BACK_PAR}</td><td class="total-col">${TOTAL_PAR}</td></tr><tr><td class="label-col">Score</td>${scoreCells(front,0)}<td class="total-col">${hasFront?frontTotal:'—'}</td>${scoreCells(back,9)}<td class="total-col">${hasBack?backTotal:'—'}</td><td class="total-col">${hasFront||hasBack?grandTotal:'—'}</td></tr></tbody>`;}

  function buildRingerCard(){const ringerScores=Array.from({length:18},(_,i)=>{const holesPlayed=rounds.map(r=>r.scores[i]).filter(s=>s!==null&&s!==undefined);return holesPlayed.length>0?Math.min(...holesPlayed):null;});const rEl=document.getElementById('ringer-table');const front=ringerScores.slice(0,9);const back=ringerScores.slice(9,18);const frontFilled=front.filter(s=>s!==null);const backFilled=back.filter(s=>s!==null);const frontTotal=frontFilled.reduce((a,b)=>a+b,0);const backTotal=backFilled.reduce((a,b)=>a+b,0);const grandTotal=frontTotal+backTotal;const holesPlayed=ringerScores.filter(s=>s!==null).length;const holeHeaders=(start)=>Array.from({length:9},(_,i)=>`<th>${start+i+1}</th>`).join('');const parCells=(start)=>PARS.slice(start,start+9).map(p=>`<td>${p}</td>`).join('');const ringerCells=(arr,start)=>arr.map((s,i)=>`<td class="ringer-row">${scoreCell(s,PARS[start+i])}</td>`).join('');rEl.innerHTML=`<thead><tr><th class="label-col">Hole</th>${holeHeaders(0)}<th>Out</th>${holeHeaders(9)}<th>In</th><th>Tot</th></tr></thead><tbody><tr class="par-row"><td class="label-col">Par</td>${parCells(0)}<td class="total-col">${FRONT_PAR}</td>${parCells(9)}<td class="total-col">${BACK_PAR}</td><td class="total-col">${TOTAL_PAR}</td></tr><tr><td class="label-col">Ringer</td>${ringerCells(front,0)}<td class="total-col">${frontFilled.length>0?frontTotal:'—'}</td>${ringerCells(back,9)}<td class="total-col">${backFilled.length>0?backTotal:'—'}</td><td class="total-col">${holesPlayed>0?grandTotal:'—'}</td></tr></tbody>`;const tEl=document.getElementById('ringer-totals');if(holesPlayed===0){tEl.innerHTML='';return;}const diff=grandTotal-TOTAL_PAR;const diffStr=diff===0?'E':diff>0?`+${diff}`:`${diff}`;const diffClass=diff<0?'under':diff>0?'over':'';tEl.innerHTML=`<div class="ringer-stat"><div class="ringer-stat-label">Ringer Total</div><div class="ringer-stat-value">${grandTotal}</div></div><div class="ringer-stat"><div class="ringer-stat-label">vs Par</div><div class="ringer-stat-value ${diffClass}">${diffStr}</div></div><div class="ringer-stat"><div class="ringer-stat-label">Holes Set</div><div class="ringer-stat-value">${holesPlayed}/18</div></div>`;}

  function buildHistory(){const hEl=document.getElementById('round-history');if(rounds.length===0){hEl.innerHTML='<p class="empty">No rounds yet.</p>';return;}hEl.innerHTML=rounds.map(r=>{const front=r.scores.slice(0,9).reduce((a,b)=>a+(b||0),0);const back=r.scores.slice(9).reduce((a,b)=>a+(b||0),0);const total=front+back;const diff=total-TOTAL_PAR;const diffStr=diff===0?'E':diff>0?`+${diff}`:`${diff}`;return`<div class="round-item"><div class="round-item-header" onclick="toggleRound(${r.id})"><span class="round-item-date">${r.date}</span><div class="round-item-actions"><span class="round-item-score">${total} (${diffStr})</span><button class="delete-btn" onclick="event.stopPropagation();deleteRound(${r.id})">✕</button></div></div><div class="round-item-body" id="body-${r.id}"><div class="scorecard-wrap"><table class="scorecard" id="table-${r.id}"></table></div></div></div>`;}).join('');}

  function toggleRound(id){const body=document.getElementById(`body-${id}`);const isOpen=body.classList.contains('open');document.querySelectorAll('.round-item-body').forEach(b=>b.classList.remove('open'));if(!isOpen){body.classList.add('open');const round=rounds.find(r=>r.id===id);if(round)buildScorecardTable(round.scores,document.getElementById(`table-${id}`));}}

  async function loadRounds(){try{const res=await fetch(SUPABASE_URL+'/rest/v1/ringer_rounds?order=date.desc,id.desc',{headers:HEADERS});const data=await res.json();rounds=data.map(r=>({id:r.id,date:r.date,scores:JSON.parse(r.scores)}));}catch(e){document.getElementById('round-history').innerHTML='<p class="empty">Error loading. Check connection.</p>';return;}const rp=document.getElementById('rounds-played');rp.textContent=rounds.length===0?'No rounds entered yet.':`Based on ${rounds.length} round${rounds.length>1?'s':''} played this season.`;buildRingerCard();buildHistory();}

  async function saveRound(){const date=document.getElementById('round-date').value;if(!date){alert('Please select a date.');return;}const scores=[];for(let i=1;i<=18;i++){const val=document.getElementById(`hole-${i}`).value;scores.push(val?parseInt(val):null);}if(scores.every(s=>s===null)){alert('Please enter at least one score.');return;}const body={date,scores:JSON.stringify(scores)};const res=await fetch(SUPABASE_URL+'/rest/v1/ringer_rounds',{method:'POST',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(body)});if(!res.ok){alert('Error saving. Please try again.');return;}for(let i=1;i<=18;i++)document.getElementById(`hole-${i}`).value='';showView('ringer');await loadRounds();}

  async function deleteRound(id){if(!confirm('Delete this round?'))return;await fetch(SUPABASE_URL+'/rest/v1/ringer_rounds?id=eq.'+id,{method:'DELETE',headers:HEADERS});await loadRounds();}

  function showView(view){['ringer','add','history'].forEach(v=>{document.getElementById(`view-${v}`).style.display=v===view?'':'none';document.getElementById(`btn-${v}`).classList.toggle('active',v===view);});}

  buildInputs();
  loadRounds();
</script>
</body>
</html>
